<!DOCTYPE html>
<html lang="en-US">
<head>
    <title>Geometry Dash</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="icon" href="https://e3334afd.cf-nate.pages.dev/0/g/geodash/game/splash.png">

    <!-- FIXED: full URL -->
    <link rel="stylesheet" href="https://rawcdn.githack.com/genizy/google-class/main/gdlite/themes/geometrydashlite.io/rs/css/home.css">

    <style>
        body {
            margin: 0;
            background: linear-gradient(black, #0066ff);
            overflow: hidden;
        }

        #gameContainer {
            width: 100vw;
            height: 100vh;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #loader {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(black, #0066ff);
            flex-direction: column;
        }

        .logo {
            max-width: 80%;
        }
    </style>
</head>

<body>

<div id="gameContainer"></div>

<div id="loader">
    <img class="logo" src="https://rawcdn.githack.com/genizy/google-class/main/gdlite/image/loading.png">
</div>

<!-- FIXED: full path -->
<script src="https://rawcdn.githack.com/genizy/google-class/main/gdlite/Build/UnityLoader.js"></script>

<script>
var gameInstance = UnityLoader.instantiate(
    "gameContainer",
    "https://rawcdn.githack.com/genizy/google-class/main/gdlite/Build/GeometryDashLite.json",
    {
        onProgress: function (gameInstance, progress) {
            if (progress === 1) {
                document.getElementById("loader").style.display = "none";
            }
        }
    }
);
</script>

</body>
</html>
